<!-- @dsCard group="Components" name="Chips & tags" subtitle="Neutral · teal · red · outline + LIVE badge" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chips: CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-primary);color:var(--label-grey-high);padding:24px}
.card{background:var(--bg-primary);border:1px solid rgb(var(--rgb-grey) / 0.12);border-radius:var(--radius-md);box-shadow:var(--elevation-1);padding:24px;max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-grey-high)}
.sub{color:var(--label-grey-medium);font-size:13px;margin:0 0 20px}
.set{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--radius-full);font-weight:600;font-size:12px}
.neutral{background:var(--fill-grey-medium);color:var(--label-grey-high)}
.tealSolid{background:var(--fill-secondary-prominent);color:var(--label-static-white-high)}.tealSoft{background:var(--fill-secondary-medium);color:var(--label-secondary-high)}
.redSolid{background:var(--fill-primary-prominent);color:var(--label-static-white-high)}.redSoft{background:var(--fill-primary-low);color:var(--label-primary-high)}
.outline{background:transparent;color:var(--label-grey-high);box-shadow:inset 0 0 0 1px rgb(var(--rgb-grey) / 0.20)}
.live{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--radius-full);background:var(--fill-primary-muted);color:var(--label-primary-high);font-weight:800;font-size:10px;letter-spacing:.4px}
</style></head><body><div class="card">
<h1>Chips &amp; tags</h1><p class="sub">Full pills. The LIVE badge is the one place red leads.</p>
<div class="set"><span class="chip neutral">All</span><span class="chip tealSoft">Batting</span><span class="chip tealSolid">Selected</span><span class="chip outline">T20</span></div>
<div class="set"><span class="chip redSoft">Out</span><span class="chip redSolid">Alert</span><span class="live">LIVE</span></div>
</div></body></html>
