<!-- @dsCard group="Components" name="Chips & tags" subtitle="Neutral · teal · red · outline + LIVE badge" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chips — CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);color:var(--label-1);padding:24px}
.card{background:var(--bg-primary);border:var(--border);border-radius:var(--r-12);box-shadow:var(--shadow-1);padding:24px;max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-1)}
.sub{color:var(--label-2);font-size:13px;margin:0 0 20px}
.set{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--r-pill);font-weight:600;font-size:12px}
.neutral{background:rgba(142,142,147,.16);color:var(--label-1)}
.tealSolid{background:var(--ch-teal);color:#fff}.tealSoft{background:var(--fill-teal);color:var(--ch-teal-dark)}
.redSolid{background:var(--ch-red);color:#fff}.redSoft{background:var(--fill-red);color:var(--ch-red)}
.outline{background:transparent;color:var(--label-1);box-shadow:inset 0 0 0 1px var(--divider-strong)}
.live{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--r-pill);background:var(--ch-red);color:#fff;font-weight:800;font-size:10px;letter-spacing:.4px}
.dot{width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.35);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style></head><body><div class="card">
<h1>Chips &amp; tags</h1><p class="sub">Full pills. The LIVE badge is the one place red leads, with a pulsing dot.</p>
<div class="set"><span class="chip neutral">All</span><span class="chip tealSoft">Batting</span><span class="chip tealSolid">Selected</span><span class="chip outline">T20</span></div>
<div class="set"><span class="chip redSoft">Out</span><span class="chip redSolid">Alert</span><span class="live"><span class="dot"></span>LIVE</span></div>
</div></body></html>
