<!-- @dsCard group="Foundations" name="Corner radius" subtitle="8 buttons · 12 cards · 16 sheets · pill chips" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radius: CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-primary);color:var(--label-grey-high);padding:24px}
.wrap{max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-grey-high)}
.sub{color:var(--label-grey-medium);font-size:13px;margin:0 0 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px}
.box{background:var(--fill-secondary-medium);border:1.5px solid var(--fill-secondary-prominent);height:80px;display:flex;align-items:center;justify-content:center;color:var(--label-secondary-high);font-weight:600;font-size:13px}
.cap{margin-top:8px;font-size:12px;color:var(--label-grey-medium);text-align:center}
</style></head><body><div class="wrap">
<h1>Corner radius</h1><p class="sub">Four steps cover the system.</p>
<div class="grid">
<div><div class="box" style="border-radius:var(--radius-sm)">8px</div><div class="cap">Inputs · controls</div></div>
<div><div class="box" style="border-radius:var(--radius-md)">12px</div><div class="cap">Cards · modals</div></div>
<div><div class="box" style="border-radius:var(--radius-lg)">16px</div><div class="cap">Bottom sheets</div></div>
<div><div class="box" style="border-radius:var(--radius-full)">pill</div><div class="cap">Buttons · chips · avatars</div></div>
</div></div></body></html>
