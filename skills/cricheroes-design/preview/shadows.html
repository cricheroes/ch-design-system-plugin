<!-- @dsCard group="Foundations" name="Shadows" subtitle="Only three: raised, overlay, modal" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shadows: CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-primary);color:var(--label-grey-high);padding:24px}
.wrap{max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-grey-high)}
.sub{color:var(--label-grey-medium);font-size:13px;margin:0 0 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:24px}
.box{background:var(--bg-primary);border-radius:var(--radius-md);padding:20px;height:90px;display:flex;flex-direction:column;justify-content:flex-end}
.n{font-weight:600;font-size:14px;color:var(--label-grey-high)}.u{font-size:12px;color:var(--label-grey-medium)}
</style></head><body><div class="wrap">
<h1>Shadows</h1><p class="sub">Three levels. Nothing bigger or glowier.</p>
<div class="grid">
<div class="box" style="box-shadow:var(--elevation-1)"><div class="n">Raised</div><div class="u">Cards</div></div>
<div class="box" style="box-shadow:var(--elevation-2)"><div class="n">Overlay</div><div class="u">Dropdowns</div></div>
<div class="box" style="box-shadow:var(--elevation-4)"><div class="n">Modal</div><div class="u">Modals & sheets</div></div>
</div></div></body></html>
