<!-- @dsCard group="Components" name="Icons" subtitle="20×20, 1.75px stroke — 27 glyphs via CH.icons.hydrate" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Icons — CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);color:var(--label-1);padding:24px}
.card{background:var(--bg-primary);border:var(--border);border-radius:var(--r-12);box-shadow:var(--shadow-1);padding:24px;max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-1)}
.sub{color:var(--label-2);font-size:13px;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 6px;border:1px solid var(--divider);border-radius:var(--r-8);color:var(--label-1)}
.cell span[data-icon]{display:inline-flex}
.cell .lbl{font-size:11px;color:var(--label-2)}
</style></head><body><div class="card">
<h1>Icons</h1><p class="sub">Rounded, 1.75px stroke. Teal for actions, charcoal for content. No emoji in product UI.</p>
<div class="grid" id="grid"></div>
</div>
<script src="../assets/icons.js"></script>
<script>
  var grid=document.getElementById('grid');
  CH.icons.names.forEach(function(n){
    var c=document.createElement('div');c.className='cell';
    c.innerHTML='<span data-icon="'+n+'" data-icon-size="22"></span><span class="lbl">'+n+'</span>';
    grid.appendChild(c);
  });
  CH.icons.hydrate(document);
</script>
</body></html>
