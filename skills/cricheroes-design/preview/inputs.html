<!-- @dsCard group="Components" name="Inputs" subtitle="Text field, focus ring, error state" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inputs: CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-primary);color:var(--label-grey-high);padding:24px}
.card{background:var(--bg-primary);border:1px solid rgb(var(--rgb-grey) / 0.12);border-radius:var(--radius-md);box-shadow:var(--elevation-1);padding:24px;max-width:520px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-grey-high)}
.sub{color:var(--label-grey-medium);font-size:13px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:500;margin:14px 0 6px;color:var(--label-grey-high)}
input{width:100%;box-sizing:border-box;font-family:var(--font-primary);font-size:15px;padding:12px 14px;border:1px solid rgb(var(--rgb-grey) / 0.12);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--label-grey-high);transition:box-shadow var(--duration-fast) var(--ease-standard),border-color var(--duration-fast)}
input::placeholder{color:var(--label-grey-medium)}
input:focus{outline:none;border-color:var(--fill-secondary-prominent);box-shadow:var(--focus-ring)}
.err input{border-color:var(--fill-primary-prominent)}
.hint{font-size:12px;margin-top:6px;color:var(--label-grey-medium)}
.err .hint{color:var(--label-primary-high)}
</style></head><body><div class="card">
<h1>Inputs</h1><p class="sub">8px corners. Teal focus ring. Errors borrow red: identity, not action.</p>
<label for="t">Team name</label><input id="t" placeholder="e.g. Andheri Strikers" value="Andheri Strikers">
<div class="err"><label for="o">Overs</label><input id="o" value="0"><div class="hint">Enter at least 1 over.</div></div>
</div></body></html>
