<!-- @dsCard group="Components" name="Buttons" subtitle="Teal fill primary · soft · outline · text · destructive" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buttons — CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);color:var(--label-1);padding:24px}
.card{background:var(--bg-primary);border:var(--border);border-radius:var(--r-12);box-shadow:var(--shadow-1);padding:24px;max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-1)}
.sub{color:var(--label-2);font-size:13px;margin:0 0 20px}
.set{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.btn{font-family:var(--font-sans);font-weight:700;font-size:14px;padding:12px 20px;border:none;border-radius:var(--r-pill);cursor:pointer;transition:background var(--duration-fast) var(--ease-standard)}
.btn:focus-visible{outline:none;box-shadow:var(--focus-ring)}
.primary{background:var(--ch-teal);color:#fff}.primary:hover{background:var(--ch-teal-dark)}
.soft{background:var(--fill-teal);color:var(--ch-teal-dark)}
.outline{background:transparent;color:var(--ch-teal);box-shadow:inset 0 0 0 1.5px var(--ch-teal)}
.text{background:transparent;color:var(--ch-teal);padding:12px 4px}
.destructive{background:var(--ch-red);color:#fff}
.neutral{background:rgba(142,142,147,.16);color:var(--label-1)}
.sm{padding:8px 16px;font-size:13px}.lg{padding:14px 24px;font-size:16px}
</style></head><body><div class="card">
<h1>Buttons</h1><p class="sub">Teal fill for primary actions. Hover darkens one step. Focus shows a 2px teal ring. Red is never a button fill — except a genuinely destructive action.</p>
<div class="set"><button class="btn primary">Start match</button><button class="btn soft">Follow</button><button class="btn outline">Squads</button><button class="btn text">View insights</button></div>
<div class="set"><button class="btn destructive">Delete match</button><button class="btn neutral">Cancel</button></div>
<div class="set"><button class="btn primary sm">Small</button><button class="btn primary">Medium</button><button class="btn primary lg">Large</button></div>
</div></body></html>
