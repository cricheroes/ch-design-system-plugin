<!-- @dsCard group="Type" name="Typography" subtitle="Ubuntu Sans: 600 / 500 / 400, tabular stats" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Type: CricHeroes</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-secondary);font-family:var(--font-primary);color:var(--label-grey-high);padding:24px}
.card{background:var(--bg-primary);border:1px solid rgb(var(--rgb-grey) / 0.12);border-radius:var(--radius-md);box-shadow:var(--elevation-1);padding:24px;max-width:760px;margin:0 auto}
h1{font-weight:600;font-size:18px;margin:0 0 4px;color:var(--label-grey-high)}
.sub{color:var(--label-grey-medium);font-size:13px;margin:0 0 20px}
.row{padding:12px 0;border-bottom:1px solid rgb(var(--rgb-grey) / 0.12)}
.tag{font-size:11px;color:var(--label-grey-medium);text-transform:uppercase;letter-spacing:.06em}
.score{font-size:40px;color:var(--label-grey-high)}
table{border-collapse:collapse;margin-top:8px;font-variant-numeric:tabular-nums}
td{padding:2px 16px 2px 0;font-size:15px}
</style></head><body><div class="card">
<h1>Type</h1><p class="sub">One typeface. Always sentence case. Stats line up with tabular numbers.</p>
<div class="row"><div class="tag">Heading · 600</div><div style="font-weight:600;font-size:28px;color:var(--label-grey-high)">Chase complete in 18 overs</div></div>
<div class="row"><div class="tag">Body emphasis · 500</div><div style="font-weight:500;font-size:16px">Fought till the last over.</div></div>
<div class="row"><div class="tag">Paragraph · 400</div><div style="font-weight:400;font-size:16px">Scores saved. Check them anytime.</div></div>
<div class="row"><div class="tag">Score · tabular</div><div class="score ch-display-numeric">154/8 <span style="font-size:18px;color:var(--label-grey-medium);font-weight:400">(18.4 ov)</span></div>
<table><tr><td>R Sharma</td><td>88</td><td>52</td></tr><tr><td>V Kohli</td><td>7</td><td>9</td></tr><tr><td>S Gill</td><td>104</td><td>61</td></tr></table></div>
<div class="row" style="border:none"><span class="ch-label-small">tiny 12px label</span></div>
</div></body></html>
